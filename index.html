<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />

    <link rel="stylesheet" href="/src/css/main.css" />
    <script type="module" src="/src/js/controller.js"></script>

    <title>Cinedo &mdash; Decide what to watch</title>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <img class="header__logo" src="src/img/cinedo-logo.png" alt="" />
        <form class="search">
          <input
            type="text"
            class="search__field"
            placeholder="Search for a movie!"
          />
          <button class="btn search__btn"><span>Search</span></button>
        </form>

        <nav>
          <button class="btn random__btn">Random</button>
          <button class="btn bookmarks__btn">Bookmarks</button>
        </nav>
      </header>

      <div class="filters"></div>
      <div class="results"></div>
    </div>
  </body>
</html>
