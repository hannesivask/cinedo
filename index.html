<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>

    <link rel="stylesheet" href="/src/css/main.css" />
    <script type="module" src="/src/js/controller.js"></script>

    <title>Cinedo &mdash; Decide what to watch</title>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <img class="header--logo" src="src/img/cinedo-logo.png" alt="" />
        <form class="header__search">
          <input type="text" class="header__search--field" placeholder="" />
          <button class="btn header__search--btn">
            <ion-icon
              class="header__search--icon"
              name="search-outline"
            ></ion-icon>
          </button>
        </form>

        <nav class="header__nav">
          <button class="btn header__nav--btn">
            <ion-icon
              class="header__nav--icon"
              name="shuffle-outline"
            ></ion-icon>
          </button>
          <button class="btn header__nav--btn">
            <ion-icon
              class="header__nav--icon"
              name="bookmark-outline"
            ></ion-icon>
          </button>
        </nav>
      </header>

      <div class="filters"></div>
      <div class="results"></div>
    </div>
  </body>
</html>
