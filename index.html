<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />

    <link
      href="https://fonts.googleapis.com/css?family=Nunito+Sans:400,600,700"
      rel="stylesheet"
    />

    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>

    <link rel="stylesheet" href="/src/css/main.css" />
    <script type="module" src="/src/js/controller.js"></script>

    <title>Cinedo &mdash; Decide what to watch</title>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <a href="" class="header--logo--link">
          <img
            class="header--logo"
            src="src/img/cinedo-logo.png"
            alt="Cinedo Logo"
          />
        </a>
        <form class="header__search">
          <input type="text" class="header__search--field" placeholder="" />
          <button class="btn header--btn" type="submit">
            <ion-icon class="header--icon" name="search-outline"></ion-icon>
          </button>
        </form>

        <nav class="header__nav">
          <button class="btn header--btn">
            <ion-icon class="header--icon" name="shuffle-outline"></ion-icon>
          </button>
          <button class="btn header--btn">
            <ion-icon class="header--icon" name="bookmark-outline"></ion-icon>
          </button>
        </nav>
      </header>

      <div class="filters">
        <div class="filters__type">
          <button class="btn filters__type--btn btn--selected">
            <span>Movies</span>
          </button>
          <button class="btn filters__type--btn"><span>Series</span></button>
        </div>

        <div class="filters__filter--list">
          <figure class="filter filters__genre">
            <figcaption class="filter--caption filter--selected">
              <a href="#">Genre</a
              ><ion-icon
                class="filter--icon"
                name="chevron-down-outline"
              ></ion-icon>
            </figcaption>
            <ul class="filters--list">
              <li class="list--selection filter--selected">
                <a href="#">Comedy</a>
              </li>
              <li class="list--selection"><a href="#">Action</a></li>
            </ul>
          </figure>

          <figure class="filter filters__year">
            <figcaption class="filter--caption">
              <a href="#">Year</a
              ><ion-icon
                class="filter--icon"
                name="chevron-down-outline"
              ></ion-icon>
            </figcaption>
            <ul class="filters--list hidden">
              <li class="list--selection"><a href="#">2023</a></li>
              <li class="list--selection"><a href="#">2022</a></li>
              <li class="list--selection"><a href="#">2021</a></li>
              <li class="list--selection"><a href="#">2020</a></li>
              <li class="list--selection"><a href="#">2019</a></li>
            </ul>
          </figure>
        </div>
      </div>

      <div class="results">
        <div class="results__result">
          <img
            class="result--img"
            src="https://marketplace.canva.com/EAFVCFkAg3w/1/0/1131w/canva-red-and-black-horror-movie-poster-AOBSIAmLWOs.jpg"
            alt=""
          />
          <p class="result--title">Dark</p>
        </div>

        <div class="results__result">
          <img
            class="result--img"
            src="https://s.yimg.com/ny/api/res/1.2/ZzAHlDHi8a2xdBRRbruaYQ--/YXBwaWQ9aGlnaGxhbmRlcjt3PTY0MDtoPTkyOA--/https://media.zenfs.com/en/homerun/feed_manager_auto_publish_494/d05a3f087fa57f6d41b865d53a42a5f5"
            alt=""
          />
          <p class="result--title">Moonlight</p>
        </div>

        <div class="results__result">
          <img
            class="result--img"
            src="https://img.freepik.com/premium-photo/movie-poster-design_841014-8784.jpg"
            alt=""
          />
          <p class="result--title">Tiistiy Mistity</p>
        </div>

        <div class="results__result">
          <img
            class="result--img"
            src="https://d1csarkz8obe9u.cloudfront.net/posterpreviews/adventure-movie-poster-template-design-7b13ea2ab6f64c1ec9e1bb473f345547_screen.jpg?ts=1636999411"
            alt=""
          />
          <p class="result--title">Archer</p>
        </div>

        <div class="results__result">
          <img
            class="result--img"
            src="https://assets-global.website-files.com/6009ec8cda7f305645c9d91b/6408f76710a9935109f855d4_smile-min.png"
            alt=""
          />
          <p class="result--title">Smile</p>
        </div>
      </div>

      <div class="result hidden"></div>
    </div>
  </body>
</html>
